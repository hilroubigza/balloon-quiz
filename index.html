<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Balloon Quiz</title>

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div id="gameContainer">

    <!-- HUD -->

    <div id="hud">

        <div id="scorePanel">

            🏆 คะแนน :
            <span id="score">
                0
            </span>

        </div>

        <div id="timerPanel">

            ⏳
            <span id="timer">
                10
            </span>

        </div>

    </div>

    <!-- Question -->

    <div id="questionBox">

        กำลังโหลดคำถาม...

    </div>

    <!-- Canvas -->

    <canvas id="gameCanvas">
    </canvas>

    <!-- Webcam -->

    <video
        id="webcam"
        autoplay
        playsinline
        muted>
    </video>

</div>

<!-- ========================= -->
<!-- Game Over -->
<!-- ========================= -->

<div
    id="gameOver"
    style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:999;
    color:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    ">

    <h1>
        🎉 จบเกม 🎉
    </h1>

    <h2>

        คะแนนรวม

        <span id="finalScore">

            0

        </span>

    </h2>

    <button
        onclick="location.reload()">

        เล่นอีกครั้ง

    </button>

</div>

<!-- ========================= -->
<!-- Scripts -->
<!-- ========================= -->

<script src="js/config.js"></script>

<script src="js/Utils.js"></script>

<script src="js/CursorManager.js"></script>

<script src="js/api.js"></script>

<script src="js/QuestionManager.js"></script>

<script src="js/Balloon.js"></script>

<script src="js/BalloonManager.js"></script>

<script src="js/Particle.js"></script>

<script src="js/ParticleManager.js"></script>

<script src="js/FloatingText.js"></script>

<script src="js/FloatingTextManager.js"></script>

<script src="js/SoundManager.js"></script>

<script src="js/GameFlowManager.js"></script>

<script src="js/game.js"></script>

<script
type="module"
src="js/HandTracker.js">
</script>

</body>

</html>
